<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- viewport-fit=cover is what makes env(safe-area-inset-*) resolve to
         real values, which the keyboard tray relies on. -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#FBF9F4" />
    <meta name="description" content="Play crosswords. Works offline." />

    <!-- iOS has no install prompt; these control what happens when someone
         uses Share > Add to Home Screen. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Crossword" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />

    <title>Crossword Player</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: #FBF9F4;
        overscroll-behavior: none;   /* no rubber-banding while tapping cells */
      }
      #root { position: relative; height: 100%; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
